<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 210) rotate(140) scale(520 420)">
      <stop stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#0F172A" stroke-opacity="0.06"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Decorative blobs -->
  <circle cx="260" cy="520" r="150" fill="#0F172A" fill-opacity="0.06" filter="url(#soft)"/>
  <circle cx="1000" cy="120" r="180" fill="#7C3AED" fill-opacity="0.10" filter="url(#soft)"/>

  <!-- Calendar icon -->
  <g transform="translate(540 230)">
    <rect x="0" y="0" width="120" height="120" rx="18" fill="#0F172A" fill-opacity="0.06"/>
    <rect x="26" y="34" width="68" height="62" rx="10" stroke="#0F172A" stroke-opacity="0.55" stroke-width="6"/>
    <path d="M26 52H94" stroke="#0F172A" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <path d="M43 24V40" stroke="#0F172A" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <path d="M77 24V40" stroke="#0F172A" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <path d="M60 66V83" stroke="#7C3AED" stroke-opacity="0.75" stroke-width="6" stroke-linecap="round"/>
    <path d="M60 83H74" stroke="#7C3AED" stroke-opacity="0.75" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>

